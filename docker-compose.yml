services:
  vuln-analyzer:
    image: ${IMAGE:-ghcr.io/OWNER/REPO:latest}
    container_name: vuln-analyzer
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8000}:8000"
    environment:
      PYTHONUNBUFFERED: "1"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; urllib.request.urlopen('http://127.0.0.1:8000/').read(); sys.exit(0)"
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
