name: Build & publish image

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run end-to-end pipeline check
        run: |
          python - <<'PY'
          from code_analysis import analyze_code
          from log_analysis import analyze_logs
          from integration import integrate
          from pathlib import Path

          base = Path("samples")
          vulns = analyze_code((base / "vulnerable_app.py").read_text())
          logs = analyze_logs((base / "access.log").read_text())
          report = integrate(vulns, logs)

          assert len(vulns) >= 4, f"expected >=4 code findings, got {len(vulns)}"
          assert report.overall_risk >= 0.7, f"expected risk>=0.7, got {report.overall_risk}"
          assert "критическая" in report.overall_decision.lower(), report.overall_decision

          clean_vulns = analyze_code((base / "clean_app.py").read_text())
          clean_logs = analyze_logs((base / "clean_access.log").read_text())
          clean_report = integrate(clean_vulns, clean_logs)
          assert clean_report.overall_risk == 0.0, f"clean risk!=0: {clean_report.overall_risk}"
          print("OK: vulnerable risk =", report.overall_risk, "clean risk =", clean_report.overall_risk)
          PY

  build-and-push:
    needs: smoke-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
